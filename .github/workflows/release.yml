name: Build & Release

# Push a tag like v0.1.2 → this builds the Windows app and publishes a Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the Release

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pythonnet

      - name: Sync version.py to the tag
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content version.py) -replace '__version__ = ".*"', "__version__ = `"$ver`"" | Set-Content version.py -Encoding utf8
          Write-Host "version.py -> $ver"

      - name: Fetch ffmpeg (shared build, not stored in git)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_dl -Force
          New-Item -ItemType Directory -Force -Path vendor_ffmpeg | Out-Null
          $bin = Join-Path (Get-ChildItem ffmpeg_dl -Directory | Select-Object -First 1).FullName 'bin'
          Copy-Item -Path "$bin\*" -Destination vendor_ffmpeg -Force
          Get-ChildItem vendor_ffmpeg | Select-Object Name

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm HeatMapAsia.spec

      - name: Zip build (archive root holds HeatMapAsia.exe)
        shell: pwsh
        run: Compress-Archive -Path dist/HeatMapAsia/* -DestinationPath "HeatMapAsia-${{ github.ref_name }}.zip" -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: HeatMapAsia-${{ github.ref_name }}.zip
          generate_release_notes: true
